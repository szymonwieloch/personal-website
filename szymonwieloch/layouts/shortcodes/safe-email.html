{{/*
  Usage: {{< safe-email "mrkq.grh@hadpsoh.frp" >}}
  Pass the email ENCODED with Caesar cipher (ROT3): each letter shifted forward by 3.
  Non-letter characters (@, ., etc.) are left unchanged.
  Example: "john.doe@example.com" → "mrkq.grh@hadpsoh.frp"
*/}}

{{ $encoded := .Get 0 }}

<span class="email-container">
  <a href="#"
     data-enc="{{ $encoded }}"
     onclick="const e=this.getAttribute('data-enc');const d=e.replace(/[a-zA-Z]/g,c=>{const b=c>='a'?97:65;return String.fromCharCode((c.charCodeAt(0)-b+23)%26+b)});window.location.href='mailto:'+d;return false;">
    <script>
      // Decode Caesar cipher (ROT-3): shift each letter backward by 3
      var enc = "{{ $encoded }}";
      document.write(enc.replace(/[a-zA-Z]/g, function(c) {
        var base = c >= 'a' ? 97 : 65;
        return String.fromCharCode((c.charCodeAt(0) - base + 23) % 26 + base);
      }));
    </script>
  </a>
</span>
